    <script>

                }, {

                }, {

                }, {

                    image: "img/dany5/dany01.jpg",
                    link: "show6/show8.html",
                    rating: 8.8,
                    genre: "",
                    type: 'movie'
                }, {

                    image: "img/dany5/dany027.jpg",
                    link: "show6/show018.html",
                    rating: 8.3,
                    genre: "فانتازيا، دراما",
                    type: 'movie'
                },

                // ========== المسلسلات (type: 'series') ==========
                {
                    title: "بن تن",
                    image: "img/dany5/dany024.jpg",
                    link: "series/ben10.html",
                    rating: 8.2,
                    genre: "أكشن، خيال علمي",
                    type: 'series',
                    seriesId: 'ben10'
                }, {
                    title: "دانى الشبح",
                    image: "img/dany5/dany028.jpg",
                    link: "series/httyd.html",
                    rating: 8.9,
                    genre: "فانتازيا، دراما",
                    type: 'series',
                    seriesId: 'httyd'
                }
            ];

            const ITEMS_PER_PAGE = 18;
            let currentPage = 1,
                currentFilter = 'all',
                filteredItems = [...allItems];

            function openLink(url) {
                playClick();
                if (url && url !== "#") window.location.href = url;
                else alert('الرابط غير متوفر');
            }

            function renderGrid(items) {
                const container = document.getElementById('mainGrid');
                container.innerHTML = '';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${item.image}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'"><div class="overlay"><div class="play-wrapper"><div class="play-btn" data-link="${item.link}"><svg width="28" height="28" viewBox="0 0 384 512" fill="white"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80v352c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg></div></div><div class="text-bottom"><h3>${item.title}</h3><div class="genre">${item.genre}</div></div></div>`;
                    container.appendChild(card);
                });
                attachEvents();
                observeCards();
            }

            function attachEvents() {
                document.querySelectorAll('.play-btn').forEach(btn => btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openLink(btn.dataset.link);
                }));
                document.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.play-btn')) return;
                        const btn = card.querySelector('.play-btn');
                        if (btn) openLink(btn.dataset.link);
                    });
                    card.addEventListener('touchstart', function() {
                        this.classList.add('show-overlay');
                    }, {
                        passive: true
                    });
                    card.addEventListener('touchend', function() {
                        this.classList.remove('show-overlay');
                    });
                    card.addEventListener('touchcancel', function() {
                        this.classList.remove('show-overlay');
                    });
                });
            }

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1
            });

            function observeCards() {
                document.querySelectorAll('.card').forEach(card => observer.observe(card));
            }

            function updateDisplay() {
                const total = Math.ceil(filteredItems.length / ITEMS_PER_PAGE);
                if (currentPage > total) currentPage = total || 1;
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                renderGrid(filteredItems.slice(start, start + ITEMS_PER_PAGE));
                renderPagination(total);
            }

            function renderPagination(totalPages) {
                const cont = document.getElementById('paginationControls');
                cont.innerHTML = '';
                if (totalPages <= 1) return;
                const prev = document.createElement('button');
                prev.textContent = '‹ السابق';
                prev.className = 'page-btn';
                prev.onclick = () => {
                    if (currentPage > 1) {
                        currentPage--;
                        updateDisplay();
                    }
                };
                cont.appendChild(prev);
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
                    btn.onclick = () => {
                        currentPage = i;
                        updateDisplay();
                    };
                    cont.appendChild(btn);
                }
                const next = document.createElement('button');
                next.textContent = 'التالي ›';
                next.className = 'page-btn';
                next.onclick = () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        updateDisplay();
                    }
                };
                cont.appendChild(next);
            }

            function filterItems(type) {
                if (type === 'movies') filteredItems = allItems.filter(i => i.type === 'movie');
                else if (type === 'series') filteredItems = allItems.filter(i => i.type === 'series');
                else filteredItems = [...allItems];
                currentPage = 1;
                updateDisplay();
            }

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const q = e.target.value.trim().toLowerCase();
                if (q === '') filterItems(currentFilter);
                else {
                    filteredItems = allItems.filter(i => i.title.toLowerCase().includes(q));
                    currentPage = 1;
                    updateDisplay();
                }
            });
            document.getElementById('searchBtn').addEventListener('click', () => searchInput.dispatchEvent(new Event('input')));
            document.getElementById('navSeries').addEventListener('click', e => {
                e.preventDefault();
                filterItems('series');
            });
            document.getElementById('navMovies').addEventListener('click', e => {
                e.preventDefault();
                filterItems('movies');
            });
            document.querySelector('.nav a[href="#"]').addEventListener('click', e => {
                e.preventDefault();
                filterItems('all');
            });

            const searchIconBtn = document.getElementById('searchIconBtn'),
                searchBox = document.getElementById('searchBox');
            searchIconBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                searchBox.classList.toggle('active');
                if (searchBox.classList.contains('active')) searchInput.focus();
            });
            document.addEventListener('click', (e) => {
                if (!searchBox.contains(e.target) && !searchIconBtn.contains(e.target)) searchBox.classList.remove('active');
            });
            searchBox.addEventListener('click', (e) => e.stopPropagation());

            // ---------- الكاروسيل مع دعم السحب اليدوي (Touch Swipe) ----------
            const slides = document.querySelectorAll('.video-slide');
            const thumb1 = document.getElementById('thumb1'),
                thumb2 = document.getElementById('thumb2'),
                thumb3 = document.getElementById('thumb3');
            const img1 = document.getElementById('img1'),
                img2 = document.getElementById('img2'),
                img3 = document.getElementById('img3');
            const carouselContainer = document.getElementById('thumbnailCarousel');
            let currentStartIndex = 0,
                autoRotateInterval, totalItems = allItems.length;

            function updateThumbnails(startIndex) {
                const itemsToShow = [];
                for (let i = 0; i < 3; i++) itemsToShow.push(allItems[(startIndex + i) % totalItems]);
                [thumb1, thumb2, thumb3].forEach(t => t.querySelector('.thumbnail-img').classList.add('fade-out'));
                setTimeout(() => {
                    img1.src = itemsToShow[0].image;
                    thumb1.dataset.link = itemsToShow[0].link;
                    thumb1.dataset.tooltip = itemsToShow[0].title;
                    img2.src = itemsToShow[1].image;
                    thumb2.dataset.link = itemsToShow[1].link;
                    thumb2.dataset.tooltip = itemsToShow[1].title;
                    img3.src = itemsToShow[2].image;
                    thumb3.dataset.link = itemsToShow[2].link;
                    thumb3.dataset.tooltip = itemsToShow[2].title;
                    [thumb1, thumb2, thumb3].forEach(t => t.querySelector('.thumbnail-img').classList.remove('fade-out'));
                    setActiveThumb(1);
                }, 150);
            }

            function setActiveThumb(activeIndex) {
                [thumb1, thumb2, thumb3].forEach((t, i) => t.classList.toggle('active', i === activeIndex));
                const videoIndex = (currentStartIndex + 1) % slides.length;
                slides.forEach((s, i) => {
                    s.classList.toggle('active', i === videoIndex);
                    const v = s.querySelector('video');
                    if (v) i === videoIndex ? v.play().catch(() => {}) : v.pause();
                });
            }

            function nextCarouselStep() {
                currentStartIndex = (currentStartIndex + 1) % totalItems;
                updateThumbnails(currentStartIndex);
            }

            function prevCarouselStep() {
                currentStartIndex = (currentStartIndex - 1 + totalItems) % totalItems;
                updateThumbnails(currentStartIndex);
            }

            function startAutoRotate() {
                clearInterval(autoRotateInterval);
                autoRotateInterval = setInterval(nextCarouselStep, 5000);
            }

            function stopAutoRotate() {
                clearInterval(autoRotateInterval);
            }

            let touchStartX = 0,
                touchStartY = 0,
                isSwipingCarousel = false;
            carouselContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isSwipingCarousel = true;
                stopAutoRotate();
            }, {
                passive: true
            });

            carouselContainer.addEventListener('touchmove', (e) => {
                if (!isSwipingCarousel) return;
                const diffX = e.touches[0].clientX - touchStartX;
                const diffY = e.touches[0].clientY - touchStartY;
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    e.preventDefault();
                }
            }, {
                passive: false
            });

            carouselContainer.addEventListener('touchend', (e) => {
                if (!isSwipingCarousel) return;
                isSwipingCarousel = false;
                const touchEndX = e.changedTouches[0].clientX;
                const diffX = touchEndX - touchStartX;
                const diffY = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(diffX) < 30 || Math.abs(diffX) < Math.abs(diffY)) {
                    startAutoRotate();
                    return;
                }
                playClick();
                if (diffX > 0) {
                    prevCarouselStep();
                } else {
                    nextCarouselStep();
                }
                startAutoRotate();
            });

            updateThumbnails(0);
            startAutoRotate();

            [thumb1, thumb2, thumb3].forEach((t, idx) => {
                t.addEventListener('click', (e) => {
                    playClick();
                    const link = t.dataset.link;
                    if (link) window.open(link, '_blank');
                    const clickedIndex = (currentStartIndex + idx) % totalItems;
                    currentStartIndex = (clickedIndex - 1 + totalItems) % totalItems;
                    updateThumbnails(currentStartIndex);
                    stopAutoRotate();
                    startAutoRotate();
                });
                t.addEventListener('mouseenter', stopAutoRotate);
                t.addEventListener('mouseleave', startAutoRotate);
            });

            const notifyBtn = document.getElementById('enableNotificationsBtn');
            if ('serviceWorker' in navigator && 'PushManager' in window) {
                navigator.serviceWorker.register('/HaM/sw.js');
                notifyBtn.addEventListener('click', () => alert('الإشعارات قيد التطوير'));
            } else notifyBtn.style.display = 'none';

            const themeBtn = document.getElementById('themeToggle'),
                body = document.body;
            let isDark = true;
            themeBtn.addEventListener('click', () => {
                playClick();
                if (isDark) {
                    body.classList.add('light-mode');
                    themeBtn.innerHTML = '<svg width="1.2em" height="1.2em" viewBox="0 0 512 512" fill="currentColor"><path d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96zm246.4 80.5l-94.7-47.3 33.5-100.4c4.5-13.6-8.4-26.5-21.9-21.9l-100.4 33.5-47.4-94.8c-6.4-12.8-24.6-12.8-31 0l-47.3 94.7L92.7 70.8c-13.6-4.5-26.5 8.4-21.9 21.9l33.5 100.4-94.7 47.4c-12.8 6.4-12.8 24.6 0 31l94.7 47.3-33.5 100.5c-4.5 13.6 8.4 26.5 21.9 21.9l100.4-33.5 47.3 94.7c6.4 12.8 24.6 12.8 31 0l47.3-94.7 100.4 33.5c13.6 4.5 26.5-8.4 21.9-21.9l-33.5-100.4 94.7-47.3c13-6.5 13-24.7.2-31.1zm-155.9 106c-49.9 49.9-131.1 49.9-181 0-49.9-49.9-49.9-131.1 0-181 49.9-49.9 131.1-49.9 181 0 49.9 49.9 49.9 131.1 0 181z"/></svg>';
                    isDark = false;
                } else {
                    body.classList.remove('light-mode');
                    themeBtn.innerHTML = '<svg width="1.2em" height="1.2em" viewBox="0 0 512 512" fill="currentColor"><path d="M283.211 512c78.962 0 151.079-35.925 198.857-94.792 7.068-8.708-.639-21.43-11.562-19.35-124.203 23.654-238.262-71.576-238.262-196.954 0-72.222 38.662-138.635 101.498-174.394 9.686-5.512 7.25-20.197-3.756-22.23C301.632 1.15 270.809 0 239.961 0 107.998 0 0 107.998 0 240c0 132.002 107.998 240 240 240h43.211z"/></svg>';
                    isDark = true;
                }
                document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#2a3f6e' : '#1e4a6b');
            });

            updateDisplay();
        })();
